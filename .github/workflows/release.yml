name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create release tarball
        id: archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE="opentcs-i18n-zh-overlay-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" i18n-overlay/ scripts/ README.md
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "Created $ARCHIVE ($(du -h "$ARCHIVE" | cut -f1))"

      - name: Delete existing release (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: "v${{ steps.version.outputs.VERSION }}"
        run: |
          RELEASE_ID=$(gh release view "$TAG" --json id -q '.id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting existing release (id=$RELEASE_ID) for tag $TAG"
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
            sleep 2
          else
            echo "No existing release for $TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }} — openTCS ${{ steps.version.outputs.VERSION }} 中文语言包"
          body: |
            ## 前置条件

            从 [openTCS 官方](https://www.opentcs.org/en/download.html) 下载 `opentcs-${{ steps.version.outputs.VERSION }}-bin.zip` 并解压。

            ## 安装

            ### Linux / macOS

            ```bash
            tar xzf opentcs-i18n-zh-overlay-${{ steps.version.outputs.VERSION }}.tar.gz
            cd opentcs-i18n-zh-overlay
            ./scripts/install.sh /path/to/opentcs-${{ steps.version.outputs.VERSION }}-bin
            ```

            ### Windows

            ```cmd
            tar xzf opentcs-i18n-zh-overlay-${{ steps.version.outputs.VERSION }}.tar.gz
            cd opentcs-i18n-zh-overlay
            scripts\install.bat C:\opentcs-${{ steps.version.outputs.VERSION }}-bin
            ```

            ## 启动

            ### Linux / macOS
            ```bash
            opentcs-kernel/startKernel.sh
            opentcs-kernelcontrolcenter/startKernelControlCenter.sh
            opentcs-modeleditor/startModelEditor.sh
            opentcs-operationsdesk/startOperationsDesk.sh
            ```

            ### Windows
            ```cmd
            opentcs-kernel\startKernel.bat
            opentcs-kernelcontrolcenter\startKernelControlCenter.bat
            opentcs-modeleditor\startModelEditor.bat
            opentcs-operationsdesk\startOperationsDesk.bat
            ```

            ## 卸载

            | 平台 | 命令 |
            |------|------|
            | Linux / macOS | `./scripts/uninstall.sh <opentcs目录>` |
            | Windows | `scripts\uninstall.bat <opentcs目录>` |

            ## 内容

            - 44 个中文翻译文件（CC BY 4.0）
            - 一键安装/卸载脚本（Linux + Windows）
            - ~24KB，无需编译，无依赖
          files: "${{ steps.archive.outputs.ARCHIVE }}"
          draft: false
          prerelease: false
